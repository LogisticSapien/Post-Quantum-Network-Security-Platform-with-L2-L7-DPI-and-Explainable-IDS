# Quantum Sniffer — Whitelist Configuration
# ============================================
# These lists suppress false positives from known-safe sources.
# Edit this file to add your organization's specific whitelists.

whitelist:
  # IP CIDR ranges to exclude from port-scan detection
  # Default: Cloudflare, Akamai, Fastly CDN ranges
  ip_cidrs:
    # Cloudflare
    - "104.16.0.0/12"
    - "162.158.0.0/15"
    - "173.245.48.0/20"
    - "103.21.244.0/22"
    - "103.22.200.0/22"
    - "103.31.4.0/22"
    - "141.101.64.0/18"
    - "108.162.192.0/18"
    - "190.93.240.0/20"
    - "188.114.96.0/20"
    - "197.234.240.0/22"
    - "198.41.128.0/17"
    # Akamai
    - "23.0.0.0/12"
    - "104.64.0.0/10"
    # Fastly
    - "151.101.0.0/16"

  # Multicast IPs to exclude from TTL anomaly detection
  multicast_ips:
    - "239.255.255.250"   # SSDP (UPnP)
    - "224.0.0.251"       # mDNS
    - "224.0.0.252"       # LLMNR
    - "224.0.0.1"         # All Hosts
    - "224.0.0.2"         # All Routers

  # Domain suffixes to exclude from DNS tunnel detection
  dns_domains:
    - "windowsupdate.com"
    - "microsoft.com"
    - "googleapis.com"
    - "gstatic.com"
    - "google.com"
    - "apple.com"
    - "icloud.com"
    - "akamaized.net"
    - "cloudflare.com"
    - "amazonaws.com"
    - "azure.com"
    - "live.com"
    - "office.com"
    - "office365.com"
    - "msftconnecttest.com"
    - "digicert.com"
    - "verisign.com"
    - "github.com"
    - "npmjs.org"
    - "pypi.org"
